name: Publish RubyGem and GitHub release

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest-public
    name: Publish RubyGem and GitHub release
    steps:
      - uses: actions/checkout@v3

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.0.0

      - name: Get version
        id: version
        run: |
          VERSION=$(sed -n "s/.*VERSION = [\"']\(.*\)[\"'].*/\1/p" lib/stytch/version.rb)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check for config.rb diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          git fetch --depth=1 origin "$BASE_SHA"
          if git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- lib/stytch/version.rb; then
            echo "diff=0" >> $GITHUB_OUTPUT
          else
            echo "diff=1" >> $GITHUB_OUTPUT
          fi

      - name: Publish RubyGem
        if: steps.diff.outputs.diff != 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEM_HOST_API_KEY: "${{ secrets.RUBYGEMS_AUTH_TOKEN }}"
        run: |
          mkdir -p $HOME/.gem
          touch $HOME/.gem/credentials
          chmod 0600 $HOME/.gem/credentials
          printf -- "---\n:rubygems_api_key: ${GEM_HOST_API_KEY}\n" > $HOME/.gem/credentials
          gem build stytch.gemspec
          gem push "stytch-${{ steps.version.outputs.version }}.gem"

      - name: Create release
        if: steps.diff.outputs.diff != 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.version.outputs.release_tag }}" --generate-notes
